[build]
  command = "npm run build"
  publish = "frontend/dist"

[[redirects]]
  from = "/api/*"
  to = "https://whatapp-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/webhooks/*"
  to = "https://whatapp-backend.onrender.com/webhooks/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
